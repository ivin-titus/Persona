<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Palette</title>
  <link rel="stylesheet" href="palette.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="palette-container">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="palette-search" placeholder="Type a command or search files..." autofocus autocomplete="off">
    </div>
    
    <div id="palette-list" class="palette-list">
      <!-- Actions and Recent files will be injected here -->
    </div>
    
    <div class="palette-footer">
      <div class="shortcut-info">
        <span><kbd>↑↓</kbd> Navigate</span>
        <span><kbd>↵</kbd> Execute</span>
        <span><kbd>ESC</kbd> Close</span>
      </div>
      <div class="brand">Persona Command Palette</div>
    </div>
  </div>
  <script src="palette.js"></script>
</body>
</html>
